<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NT Safety Commander | V3.3.0 Research Matrix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-purple { border-left: 4px solid #a855f7; }
        .fat-finger { height: 50px; border-radius: 1rem; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; font-size: 9px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const MASTER_PASSCODE = "2026";

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [view, setView] = useState('MAIN');

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm text-center border-t-4 border-purple-500">
                        <h2 className="text-xl font-black mb-6 uppercase italic">NT Research System</h2>
                        <input type="password" onChange={(e) => e.target.value === MASTER_PASSCODE && setIsAuthenticated(true)} 
                               className="bg-black/40 p-4 rounded-xl text-center text-2xl tracking-[0.5em] w-full outline-none border border-white/10" placeholder="****" />
                    </div>
                </div>
            );

            if (view === 'MAIN') return (
                <div className="p-6">
                    {/* Research Matrix Widget */}
                    <div className="glass p-6 rounded-[2.5rem] card-purple mb-8 bg-purple-500/5">
                        <p className="text-[9px] font-black uppercase text-purple-400 mb-4 tracking-widest"><i className="fa-solid fa-layer-group mr-2"></i> Holistic Risk Matrix</p>
                        <div className="space-y-3">
                            <div className="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                                <span className="text-[9px] font-bold uppercase">Mechanical Risks</span>
                                <span className="text-[8px] bg-purple-500/20 px-2 py-1 rounded text-purple-300 italic">Analysis Stage</span>
                            </div>
                            <div className="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                                <span className="text-[9px] font-bold uppercase">Atmospheric/Chemical</span>
                                <span className="text-[8px] bg-purple-500/20 px-2 py-1 rounded text-purple-300 italic">Data Collection</span>
                            </div>
                            <div className="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                                <span className="text-[9px] font-bold uppercase">Human Factor (SIMOPS)</span>
                                <span className="text-[8px] bg-purple-500/20 px-2 py-1 rounded text-purple-300 italic">Literature Review</span>
                            </div>
                        </div>
                    </div>

                    {/* Navigation */}
                    <div className="grid grid-cols-1 gap-3">
                        <button onClick={() => setView('BIBLIOGRAPHY')} className="fat-finger bg-purple-700 shadow-lg"><i className="fa-solid fa-book"></i> Bibliography Vault</button>
                        <button onClick={() => setView('INSPECTION')} className="fat-finger bg-blue-600"><i className="fa-solid fa-clipboard-list"></i> Field Operations</button>
                        <button onClick={() => setView('STUDY')} className="fat-finger bg-sky-700"><i className="fa-solid fa-microscope"></i> Study Database</button>
                    </div>

                    <div className="mt-10 p-4 text-center opacity-30">
                        <p className="text-[7px] font-black uppercase tracking-[0.4em]">Nautical Technology Research Division</p>
                    </div>
                </div>
            );

            if (view === 'BIBLIOGRAPHY') return (
                <div className="p-6">
                    <button onClick={() => setView('MAIN')} className="text-[10px] font-black text-blue-500 mb-6 uppercase italic">← Back</button>
                    <h2 className="text-xl font-black italic mb-6 text-purple-400 uppercase tracking-tighter">Bibliography Vault</h2>
                    <div className="space-y-4">
                        <div className="glass p-5 rounded-2xl border-l-2 border-white/10">
                            <p className="text-[10px] font-black text-purple-300 uppercase">ISGOTT 6th Edition</p>
                            <p className="text-[9px] opacity-60 italic mt-1">Tanker safety and atmospheric monitoring protocols.</p>
                        </div>
                        <div className="glass p-5 rounded-2xl border-l-2 border-white/10">
                            <p className="text-[10px] font-black text-purple-300 uppercase">IMO ISM Code</p>
                            <p className="text-[9px] opacity-60 italic mt-1">International standards for safe management of ships.</p>
                        </div>
                        <div className="glass p-5 rounded-2xl border-l-2 border-white/10">
                            <p className="text-[10px] font-black text-purple-300 uppercase">OSHA 1915 Subpart B</p>
                            <p className="text-[9px] opacity-60 italic mt-1">Confined and Enclosed Spaces in Shipyard Employment.</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="p-6">
                    <button onClick={() => setView('MAIN')} className="text-[10px] font-black text-blue-500 mb-6 uppercase italic">← Back</button>
                    <div className="glass p-10 rounded-[3rem] text-center italic opacity-40 uppercase font-black text-[10px]">Data Collection Active</div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
