<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safety Officer | V2.7.2 Override</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fat-finger { height: 70px; font-weight: 900; text-transform: uppercase; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; width: 100%; }
        select { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 1rem; color: white; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const MASTER_PASSCODE = "2026";
        
        const SAFETY_TIPS = {
            "Scaffolding": "ADVICE: Check base plates, green tags, and harness points. Wind < 20kts.",
            "Enclosed Space Entry": "ADVICE: Confirm Chemist Certificate. Continuous ventilation. Standby person present.",
            "Hot Works": "ADVICE: Fire blanket & extinguishers. Fire watch 30m post-work.",
            "Lifting Ops": "ADVICE: Check SWL/Slings. Clear lifting zone. Radio comms check.",
            "Tank Cleaning": "ADVICE: Proper PPE for chemicals. Lighting 24V. Emergency escape clear."
        };

        const WORK_AREAS = {
            "Main Deck": ["Hot Works", "Painting", "Scaffolding", "Lifting Ops", "Grinding"],
            "Double Bottoms (DB)": ["Enclosed Space Entry", "Tank Cleaning", "Welding", "Inspection"],
            "Engine Room": ["Maintenance", "Electrical Works", "Insulation", "Hot Works"],
            "Pump Room": ["Valve Overhaul", "Bilge Check", "Pipe Works"]
        };

        const SEPE_SCHEDULE = [
            { id: 'SAL01', name: 'SALAMIS SHIPREPAIR', afm: '801861870', loc: 'Τεύκρου 48', shift: '07:00-11:00' },
            { id: 'SAL02', name: 'ΣΑΛΑΜΙΣ ΝΑΥΠΗΓΕΙΑ', afm: '800372043', loc: 'Αμπελάκια', shift: '11:00-15:00' },
            { id: 'ALX01', name: 'MT FELIX', loc: 'Alexandroupolis FSRU', shift: '07:00-11:00' },
            { id: 'ALX02', name: 'BADJI MOKHTAR III', loc: 'Alexandroupolis FSRU', shift: '11:00-13:00' }
        ];

        const SafetyOfficerV272 = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [view, setView] = useState('WATCHLIST');
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]'));
            const [completedVessels, setCompletedVessels] = useState(() => JSON.parse(localStorage.getItem('ntg_completed_today') || '{}'));
            
            const [activeVessel, setActiveVessel] = useState(null);
            const [selectedArea, setSelectedArea] = useState("");
            const [selectedTasks, setSelectedTasks] = useState([]);
            const [remarks, setRemarks] = useState("");
            const [photoCount, setPhotoCount] = useState(0);

            useEffect(() => { localStorage.setItem('ntg_M2_logs', JSON.stringify(logs)); }, [logs]);
            useEffect(() => { localStorage.setItem('ntg_completed_today', JSON.stringify(completedVessels)); }, [completedVessels]);

            const handleSign = () => {
                const newLog = { 
                    id: Date.now(), vessel: activeVessel.name, ts: new Date().toLocaleString('el-GR'), 
                    area: selectedArea, tasks: selectedTasks, remarks, photos: photoCount 
                };
                setLogs([newLog, ...logs]);
                setCompletedVessels({...completedVessels, [activeVessel.id]: true});
                setView('WATCHLIST');
            };

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center border-t-4 border-blue-500 font-black italic">
                        <h2 className="text-xl mb-6 uppercase tracking-tighter">Secure Access</h2>
                        <input type="password" onChange={(e) => e.target.value === MASTER_PASSCODE && setIsAuthenticated(true)} 
                               className="w-full bg-black/40 p-5 rounded-xl text-center text-2xl tracking-[0.5em] outline-none border border-white/10" placeholder="****" />
                    </div>
                </div>
            );

            if (view === 'WATCHLIST') return (
                <div className="p-6">
                    <header className="glass p-6 rounded-[2rem] border-l-4 border-blue-500 mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-sm font-black text-blue-500 uppercase tracking-tighter">Safety Radar</h1>
                            <button onClick={() => setView('DASHBOARD')} className="text-blue-400 text-[10px] font-black uppercase underline">Diary History</button>
                        </div>
                        <button onClick={() => {setActiveVessel(null); setView('OVERRIDE');}} className="w-full bg-orange-600/20 border border-orange-500/50 text-orange-400 h-12 rounded-xl text-[10px] font-black uppercase italic"><i className="fa-solid fa-bolt mr-2"></i>Extra-Curricular Inspection</button>
                    </header>
                    <div className="space-y-4">
                        <p className="text-[9px] opacity-30 font-black uppercase ml-2 tracking-widest">Scheduled Shift</p>
                        {SEPE_SCHEDULE.map(v => (
                            <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); setSelectedArea(""); setSelectedTasks([]); setRemarks(""); setPhotoCount(0); }} 
                                 className="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-blue-600 active:scale-95 transition-all">
                                <div><p className="text-xs font-black uppercase italic">{v.name}</p><p className="text-[8px] opacity-40 uppercase font-black">{v.shift} | {v.loc}</p></div>
                                {completedVessels[v.id] && <i className="fa-solid fa-check-circle text-emerald-500 text-xl"></i>}
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'OVERRIDE') return (
                <div className="p-6">
                    <button onClick={() => setView('WATCHLIST')} className="text-[10px] font-black text-blue-500 mb-6 uppercase">← Cancel</button>
                    <h2 className="text-xl font-black italic mb-6 text-orange-500 uppercase tracking-tighter">Manual Site Selection</h2>
                    <div className="space-y-4">
                        {SEPE_SCHEDULE.map(v => (
                            <button key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); setSelectedArea(""); setSelectedTasks([]); setRemarks(""); setPhotoCount(0); }} 
                                    className="glass w-full p-6 rounded-[2rem] text-left border-l-4 border-orange-600 font-black uppercase italic text-xs tracking-tight">
                                {v.name} <span className="block text-[8px] opacity-40 mt-1">{v.loc}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (view === 'DASHBOARD') return (
                <div className="p-6 pb-20">
                    <button onClick={() => setView('WATCHLIST')} className="text-[10px] font-black text-blue-500 mb-6 uppercase">← Back</button>
                    <h2 className="text-lg font-black italic mb-6 text-blue-500 uppercase tracking-tighter tracking-tighter">Shift Diary</h2>
                    <div className="space-y-4">
                        {logs.map(log => (
                            <div key={log.id} className="glass p-6 rounded-[2rem] border-l-2 border-white/20">
                                <p className="text-[11px] font-black uppercase text-blue-400">{log.vessel} <span className="text-[8px] opacity-30 italic">({log.ts})</span></p>
                                <p className="text-[9px] font-bold uppercase text-emerald-500 mt-2">Area: {log.area}</p>
                                <p className="text-[9px] opacity-70 uppercase font-black">Tasks: {log.tasks.join(", ")}</p>
                                {log.remarks && <p className="text-[9px] mt-2 bg-black/40 p-3 rounded italic">Notes: {log.remarks}</p>}
                                <p className="text-[7px] mt-2 opacity-20 font-black uppercase">Photos: {log.photos}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="p-6 pb-64">
                    <button onClick={() => setView('WATCHLIST')} className="text-[9px] font-black text-blue-500 mb-6 uppercase italic">← Exit</button>
                    <div className="glass p-6 rounded-[2rem] border-l-4 border-emerald-500 mb-6 text-center">
                        <h2 className="text-xl font-black uppercase italic tracking-tighter">{activeVessel.name}</h2>
                        <p className="text-[8px] opacity-40 mt-1 uppercase font-black">{activeVessel.loc} {activeVessel.afm ? `| AFM: ${activeVessel.afm}` : ""}</p>
                    </div>

                    <div className="space-y-6">
                        <div className="glass p-6 rounded-[2rem] space-y-4">
                            <select onChange={(e) => {setSelectedArea(e.target.value); setSelectedTasks([]);}}>
                                <option value="">Select Area...</option>
                                {Object.keys(WORK_AREAS).map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                            
                            {selectedArea && (
                                <div className="space-y-2">
                                    {WORK_AREAS[selectedArea].map(task => (
                                        <div key={task} className="space-y-2">
                                            <label className="flex items-center gap-3 p-3 bg-white/5 rounded-xl"><input type="checkbox" onChange={(e) => {
                                                    const newTasks = e.target.checked ? [...selectedTasks, task] : selectedTasks.filter(t => t !== task);
                                                    setSelectedTasks(newTasks);
                                                }} className="w-5 h-5 accent-emerald-500" /><span className="text-[10px] font-black uppercase italic">{task}</span></label>
                                            {selectedTasks.includes(task) && SAFETY_TIPS[task] && (<div className="p-3 bg-blue-900/20 border border-blue-500/30 rounded-lg text-[9px] text-blue-400 font-black italic"><i className="fa-solid fa-shield-halved mr-2"></i>{SAFETY_TIPS[task]}</div>)}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="glass p-6 rounded-[2rem] space-y-2">
                            <p className="text-[9px] font-black opacity-40 uppercase tracking-widest italic">Inspector Remarks</p>
                            <textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} placeholder="Type findings..." className="w-full bg-black/20 p-4 rounded-xl text-[10px] h-32 outline-none border border-white/5 font-black" />
                        </div>
                    </div>

                    <div className="fixed bottom-6 left-6 right-6 space-y-3 glass p-4 rounded-[2rem] border-t border-white/10 z-50">
                        <div className="relative">
                            <input type="file" accept="image/*" capture="camera" onChange={() => setPhotoCount(prev => prev + 1)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <button className="fat-finger bg-slate-800 text-[10px] pointer-events-none tracking-widest italic"><i className="fa-solid fa-camera mr-2"></i>Capture Photo ({photoCount}/2)</button>
                        </div>
                        <button disabled={photoCount < 2 || selectedTasks.length === 0} onClick={handleSign} className={`fat-finger ${photoCount >= 2 && selectedTasks.length > 0 ? 'bg-emerald-600' : 'bg-slate-900 opacity-40 text-slate-500'} text-[10px] tracking-widest italic`}>Sign Daily Report</button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyOfficerV272 />);
    </script></body></html>
