<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no text-align: center">
    <title>Safety Officer | V2.7.0 Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fat-finger { height: 70px; font-weight: 900; text-transform: uppercase; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; width: 100%; }
        select { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 1rem; color: white; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const MASTER_PASSCODE = "2026";
        const WORK_AREAS = {
            "Main Deck": ["Hot Works", "Painting", "Scaffolding", "Lifting Ops", "Grinding"],
            "Double Bottoms (DB)": ["Enclosed Space Entry", "Tank Cleaning", "In-situ Inspection", "Welding"],
            "Engine Room": ["Maintenance", "Electrical Works", "Pipe Fitting", "Insulation"],
            "Pump Room": ["Gas Sampling", "Valve Overhaul", "Bilge Check"],
            "Accommodation": ["Hot Works", "AC Maintenance", "Fire System Test"]
        };

        const SEPE_SCHEDULE = [
            { id: 'ALX01', name: 'MT FELIX', type: 'LNG_CONV', shift: '07:00-11:00' },
            { id: 'ALX02', name: 'BADJI MOKHTAR III', type: 'LNG_CONV', shift: '11:00-13:00' },
            { id: 'ALX03', name: 'ΑΡΙΑΔΝΗ', type: 'STANDARD', shift: '13:00-15:00' },
            { id: 'ALX04', name: 'RIGEL III', type: 'STANDARD', shift: '15:00-17:00' }
        ];

        const SafetyOfficerV270 = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [view, setView] = useState('WATCHLIST');
            const [completedVessels, setCompletedVessels] = useState(() => JSON.parse(localStorage.getItem('ntg_completed_today') || '{}'));
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]'));
            
            const [activeVessel, setActiveVessel] = useState(null);
            const [selectedArea, setSelectedArea] = useState("");
            const [selectedTasks, setSelectedTasks] = useState([]);
            const [remarks, setRemarks] = useState("");
            const [photos, setPhotos] = useState([]);

            useEffect(() => { localStorage.setItem('ntg_completed_today', JSON.stringify(completedVessels)); }, [completedVessels]);
            useEffect(() => { localStorage.setItem('ntg_M2_logs', JSON.stringify(logs)); }, [logs]);

            const handleSign = () => {
                const newLog = { 
                    id: Date.now(),
                    vessel: activeVessel.name, 
                    ts: new Date().toLocaleString('el-GR'), 
                    area: selectedArea, 
                    tasks: selectedTasks, 
                    remarks: remarks 
                };
                setLogs([newLog, ...logs]);
                setCompletedVessels({...completedVessels, [activeVessel.id]: true});
                setView('WATCHLIST');
            };

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 text-center">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm border-t-4 border-blue-500">
                        <h2 className="text-xl font-black mb-6 italic">NT SECURE LOGIN</h2>
                        <input type="password" onChange={(e) => e.target.value === MASTER_PASSCODE && setIsAuthenticated(true)} 
                               className="w-full bg-black/40 p-5 rounded-xl text-center text-2xl tracking-[0.5em] outline-none border border-white/10" placeholder="****" />
                    </div>
                </div>
            );

            if (view === 'WATCHLIST') return (
                <div className="p-6">
                    <header className="glass p-6 rounded-[2rem] border-l-4 border-blue-500 mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-sm font-black text-blue-500 italic uppercase">Safety Radar</h1>
                            <span className="text-[9px] opacity-40 font-black">V2.7.0</span>
                        </div>
                        <button onClick={() => setView('DASHBOARD')} className="w-full bg-blue-600/20 border border-blue-500/50 text-blue-400 h-12 rounded-xl text-[10px] font-black uppercase italic tracking-widest"><i className="fa-solid fa-chart-line mr-2"></i>View Shift Log (History)</button>
                    </header>

                    <div className="space-y-4">
                        {SEPE_SCHEDULE.map(v => (
                            <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); setSelectedArea(""); setSelectedTasks([]); setRemarks(""); setPhotos([]); }} 
                                 className="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-blue-600 active:scale-95 transition-all">
                                <div><p className="text-xs font-black uppercase italic">{v.name}</p><p className="text-[8px] opacity-40 uppercase font-black">{v.shift}</p></div>
                                {completedVessels[v.id] && <i className="fa-solid fa-check-circle text-emerald-500 text-xl"></i>}
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'DASHBOARD') return (
                <div className="p-6 pb-20">
                    <button onClick={() => setView('WATCHLIST')} className="text-[10px] font-black text-blue-500 mb-6 uppercase tracking-widest">← Back to Radar</button>
                    <h2 className="text-lg font-black italic mb-6 text-blue-500 uppercase">Daily Diary Logs</h2>
                    <div className="space-y-4">
                        {logs.length === 0 ? <p className="text-[10px] opacity-30 italic text-center py-10 uppercase font-black">No logs recorded yet today.</p> : 
                        logs.map(log => (
                            <div key={log.id} className="glass p-6 rounded-[2rem] border-l-2 border-white/20">
                                <div className="flex justify-between items-start mb-4">
                                    <p className="text-[11px] font-black italic uppercase text-blue-400">{log.vessel}</p>
                                    <p className="text-[8px] opacity-30">{log.ts}</p>
                                </div>
                                <div className="space-y-2">
                                    <p className="text-[9px] font-bold text-emerald-500 uppercase">Area: {log.area}</p>
                                    <p className="text-[9px] font-bold opacity-80 uppercase">Tasks: {log.tasks.join(", ")}</p>
                                    {log.remarks && <p className="text-[9px] bg-black/30 p-3 rounded-lg italic">Obs: {log.remarks}</p>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="p-6 pb-64">
                    <button onClick={() => setView('WATCHLIST')} className="text-[9px] font-black text-blue-500 mb-6 uppercase tracking-widest italic">← Cancel Inspection</button>
                    <div className="glass p-6 rounded-[2rem] border-l-4 border-emerald-500 mb-6 text-center">
                        <h2 className="text-xl font-black uppercase italic tracking-tighter">{activeVessel.name}</h2>
                    </div>

                    <div className="space-y-6">
                        <div className="glass p-6 rounded-[2rem] space-y-4">
                            <p className="text-[9px] font-black opacity-40 uppercase tracking-widest">Location Selector</p>
                            <select onChange={(e) => {setSelectedArea(e.target.value); setSelectedTasks([]);}}>
                                <option value="">Select Area...</option>
                                {Object.keys(WORK_AREAS).map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                            
                            {selectedArea && (
                                <div className="grid grid-cols-1 gap-2 pt-2 text-[10px] font-black">
                                    {WORK_AREAS[selectedArea].map(task => (
                                        <label key={task} className="flex items-center gap-3 p-3 bg-white/5 rounded-xl active:bg-blue-900/20">
                                            <input type="checkbox" onChange={(e) => e.target.checked ? setSelectedTasks([...selectedTasks, task]) : setSelectedTasks(selectedTasks.filter(t => t !== task))} className="w-5 h-5 accent-emerald-500" />
                                            <span className="uppercase">{task}</span>
                                        </label>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="glass p-6 rounded-[2rem] space-y-4">
                            <p className="text-[9px] font-black opacity-40 uppercase tracking-widest">Safety Observations</p>
                            <textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} placeholder="Type remarks here..." className="w-full bg-black/20 p-4 rounded-xl text-[10px] h-32 outline-none border border-white/5 font-bold" />
                        </div>
                    </div>

                    <div className="fixed bottom-6 left-6 right-6 space-y-3 glass p-4 rounded-[2rem] border-t border-white/10">
                        <button onClick={() => setPhotos([...photos, Date.now()])} className="fat-finger bg-slate-800 text-[10px]">Capture Evidence ({photos.length}/2)</button>
                        <button disabled={photos.length < 2 || selectedTasks.length === 0} onClick={handleSign} className={`fat-finger ${photos.length >= 2 && selectedTasks.length > 0 ? 'bg-emerald-600 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'bg-slate-900 opacity-40 text-slate-500'} text-[10px]`}>Sign Shift Report</button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyOfficerV270 />);
    </script></body></html>
