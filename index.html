<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safety Officer | V2.7.1 Advisor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fat-finger { height: 70px; font-weight: 900; text-transform: uppercase; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; width: 100%; }
        select { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 1rem; color: white; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const MASTER_PASSCODE = "2026";
        
        // --- ADVISORY DATA ---
        const SAFETY_TIPS = {
            "Scaffolding": "ADVICE: Check base plates, green tags, and harness points. Ensure wind speed < 20kts.",
            "Enclosed Space Entry": "ADVICE: Continuous ventilation required. LEL < 1%, O2 > 20.9%. Standby person at entrance.",
            "Hot Works": "ADVICE: Fire blanket in place. Fire watch present for 30 mins after work finishes.",
            "Lifting Ops": "ADVICE: Check SWL of slings. No personnel under suspended loads. Communication via radio.",
            "Grinding": "ADVICE: Eye protection & face shield mandatory. Check for sparks landing on flammable materials."
        };

        const WORK_AREAS = {
            "Main Deck": ["Hot Works", "Painting", "Scaffolding", "Lifting Ops", "Grinding"],
            "Double Bottoms (DB)": ["Enclosed Space Entry", "Tank Cleaning", "Welding"],
            "Engine Room": ["Maintenance", "Electrical Works", "Insulation"],
            "Pump Room": ["Gas Sampling", "Valve Overhaul"]
        };

        const SEPE_SCHEDULE = [
            { id: 'ALX01', name: 'MT FELIX', type: 'LNG_CONV', shift: '07:00-11:00' },
            { id: 'ALX02', name: 'BADJI MOKHTAR III', type: 'LNG_CONV', shift: '11:00-13:00' },
            { id: 'ALX03', name: 'ΑΡΙΑΔΝΗ', type: 'STANDARD', shift: '13:00-15:00' }
        ];

        const SafetyOfficerV271 = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [view, setView] = useState('WATCHLIST');
            const [completedVessels, setCompletedVessels] = useState(() => JSON.parse(localStorage.getItem('ntg_completed_today') || '{}'));
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]'));
            
            const [activeVessel, setActiveVessel] = useState(null);
            const [selectedArea, setSelectedArea] = useState("");
            const [selectedTasks, setSelectedTasks] = useState([]);
            const [remarks, setRemarks] = useState("");
            const [photoCount, setPhotoCount] = useState(0);

            useEffect(() => { localStorage.setItem('ntg_completed_today', JSON.stringify(completedVessels)); }, [completedVessels]);
            useEffect(() => { localStorage.setItem('ntg_M2_logs', JSON.stringify(logs)); }, [logs]);

            const handleSign = () => {
                const newLog = { 
                    id: Date.now(), vessel: activeVessel.name, ts: new Date().toLocaleString('el-GR'), 
                    area: selectedArea, tasks: selectedTasks, remarks, photos: photoCount 
                };
                setLogs([newLog, ...logs]);
                setCompletedVessels({...completedVessels, [activeVessel.id]: true});
                setView('WATCHLIST');
            };

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 text-center">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm border-t-4 border-blue-500 font-black italic">
                        <h2 className="text-xl mb-6 uppercase">Secure Access</h2>
                        <input type="password" onChange={(e) => e.target.value === MASTER_PASSCODE && setIsAuthenticated(true)} 
                               className="w-full bg-black/40 p-5 rounded-xl text-center text-2xl tracking-[0.5em] outline-none border border-white/10" placeholder="****" />
                    </div>
                </div>
            );

            if (view === 'WATCHLIST') return (
                <div className="p-6">
                    <header className="glass p-6 rounded-[2rem] border-l-4 border-blue-500 mb-8">
                        <button onClick={() => setView('DASHBOARD')} className="w-full bg-blue-600/20 border border-blue-500/50 text-blue-400 h-12 rounded-xl text-[10px] font-black uppercase italic tracking-widest"><i className="fa-solid fa-book mr-2"></i>Research History / Diary</button>
                    </header>
                    <div className="space-y-4">
                        {SEPE_SCHEDULE.map(v => (
                            <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); setSelectedArea(""); setSelectedTasks([]); setRemarks(""); setPhotoCount(0); }} 
                                 className="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-blue-600 active:scale-95 transition-all">
                                <div><p className="text-xs font-black uppercase italic">{v.name}</p><p className="text-[8px] opacity-40 uppercase font-black">{v.shift}</p></div>
                                {completedVessels[v.id] && <i className="fa-solid fa-check-circle text-emerald-500 text-xl"></i>}
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'DASHBOARD') return (
                <div className="p-6 pb-20">
                    <button onClick={() => setView('WATCHLIST')} className="text-[10px] font-black text-blue-500 mb-6 uppercase italic">← Return</button>
                    <h2 className="text-lg font-black italic mb-6 text-blue-500 uppercase">Forensic Research Log</h2>
                    <div className="space-y-4">
                        {logs.map(log => (
                            <div key={log.id} className="glass p-6 rounded-[2rem] border-l-2 border-white/20">
                                <p className="text-[11px] font-black uppercase text-blue-400 mb-2">{log.vessel} ({log.ts})</p>
                                <p className="text-[9px] font-bold uppercase text-emerald-500">Area: {log.area}</p>
                                <p className="text-[9px] opacity-70 uppercase">Tasks: {log.tasks.join(", ")}</p>
                                <p className="text-[9px] mt-2 bg-black/40 p-3 rounded italic">Notes: {log.remarks}</p>
                                <p className="text-[7px] mt-2 opacity-30 uppercase font-black">Evidences captured: {log.photos}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="p-6 pb-64">
                    <button onClick={() => setView('WATCHLIST')} className="text-[9px] font-black text-blue-500 mb-6 uppercase tracking-widest italic">← Back</button>
                    <div className="glass p-6 rounded-[2rem] border-l-4 border-emerald-500 mb-6 text-center">
                        <h2 className="text-xl font-black uppercase italic">{activeVessel.name}</h2>
                    </div>

                    <div className="space-y-6">
                        <div className="glass p-6 rounded-[2rem] space-y-4">
                            <select onChange={(e) => {setSelectedArea(e.target.value); setSelectedTasks([]);}}>
                                <option value="">Select Area...</option>
                                {Object.keys(WORK_AREAS).map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                            
                            {selectedArea && (
                                <div className="space-y-2">
                                    {WORK_AREAS[selectedArea].map(task => (
                                        <div key={task} className="space-y-2">
                                            <label className="flex items-center gap-3 p-3 bg-white/5 rounded-xl">
                                                <input type="checkbox" onChange={(e) => {
                                                    const newTasks = e.target.checked ? [...selectedTasks, task] : selectedTasks.filter(t => t !== task);
                                                    setSelectedTasks(newTasks);
                                                }} className="w-5 h-5 accent-emerald-500" />
                                                <span className="text-[10px] font-black uppercase">{task}</span>
                                            </label>
                                            {selectedTasks.includes(task) && SAFETY_TIPS[task] && (
                                                <div className="p-3 bg-blue-900/20 border border-blue-500/30 rounded-lg text-[9px] text-blue-400 font-black italic">
                                                    <i className="fa-solid fa-shield-halved mr-2"></i>{SAFETY_TIPS[task]}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="glass p-6 rounded-[2rem] space-y-2">
                            <p className="text-[9px] font-black opacity-40 uppercase tracking-widest">Inspection Notes</p>
                            <textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} placeholder="Type findings and corrections..." className="w-full bg-black/20 p-4 rounded-xl text-[10px] h-32 outline-none border border-white/5 font-black" />
                        </div>
                    </div>

                    <div className="fixed bottom-6 left-6 right-6 space-y-3 glass p-4 rounded-[2rem] border-t border-white/10">
                        <div className="relative">
                            <input type="file" accept="image/*" capture="camera" onChange={() => setPhotoCount(prev => prev + 1)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <button className="fat-finger bg-slate-800 text-[10px] pointer-events-none">
                                <i className="fa-solid fa-camera mr-2"></i>Capture Photo ({photoCount}/2)
                            </button>
                        </div>
                        <button disabled={photoCount < 2 || selectedTasks.length === 0} onClick={handleSign} className={`fat-finger ${photoCount >= 2 && selectedTasks.length > 0 ? 'bg-emerald-600' : 'bg-slate-900 opacity-40 text-slate-500'} text-[10px]`}>Sign Shift</button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyOfficerV271 />);
    </script></body></html>
