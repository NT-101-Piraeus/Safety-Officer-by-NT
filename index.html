<body>

                if (lastDate !== today) {
                    localStorage.setItem('ntg_last_date', today);
                    return {};
                }
                return saved;
            });

            const [selectedArea, setSelectedArea] = useState("");
            const [selectedTasks, setSelectedTasks] = useState([]);
            const [remarks, setRemarks] = useState("");
            const [photos, setPhotos] = useState([]);

            const [checks, setChecks] = useState({ fire: false, gasFree: false });

            useEffect(() => { localStorage.setItem('ntg_completed_today', JSON.stringify(completedVessels)); }, [completedVessels]);

            const handleSign = () => {
                const log = { vessel: activeVessel.name, ts: new Date().toLocaleString(), tasks: selectedTasks, area: selectedArea, remarks, gas };

                localStorage.setItem('ntg_M2_logs', JSON.stringify(logs));

                setView('WATCHLIST');
            };

                        <h2 className="text-xl font-black mb-6 italic">SECURE ACCESS</h2>
                        <input type="password" onChange={(e) => e.target.value === MASTER_PASSCODE && setIsAuthenticated(true)} 
                               className="w-full bg-black/40 p-5 rounded-xl text-center text-2xl tracking-[0.5em] outline-none border border-white/10" placeholder="****" />
                    </div>
                </div>
            );

            if (view === 'WATCHLIST') return (

                    <header className="glass p-6 rounded-[2rem] mb-8 border-l-4 border-blue-500">

                        <p className="text-[10px] opacity-50 uppercase mt-2">Date: {new Date().toLocaleDateString()}</p>
                    </header>
