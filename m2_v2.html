<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safety Officer by NT | All-In-One</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fat-finger { height: 75px; font-weight: 900; text-transform: uppercase; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .fat-finger:active { transform: scale(0.95); }
        .matrix-blink { animation: blink 1.5s infinite; border: 2px solid #10b981; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); } 50% { box-shadow: none; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const SafetyOfficerV25 = () => {
            const [view, setView] = useState('WATCHLIST'); // WATCHLIST, ACADEMY, INSPECTION
            const [academyCleared, setAcademyCleared] = useState(false);
            const [completed, setCompleted] = useState({});
            
            // Inspection States
            const [activeVessel, setActiveVessel] = useState(null);
            const [photos, setPhotos] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [gas, setGas] = useState({ o2: '', lel: '' });
            const [checks, setChecks] = useState({ fire: false, gasFree: false });

            const fleet = [
                { id: 1, name: 'MT FELIX', type: 'LNG_CONV', shift: '07:00-11:00' },
                { id: 2, name: 'BADJI MOKHTAR III', type: 'LNG_CONV', shift: '11:00-13:00' },
                { id: 3, name: 'ΑΡΙΑΔΝΗ', type: 'STANDARD', shift: '13:00-15:00' },
                { id: 4, name: 'RIGEL III', type: 'STANDARD', shift: '15:00-17:00' }
            ];

            const canSign = photos.length >= 2 && tasks.length > 0 && checks.fire && checks.gasFree && (activeVessel?.type !== 'LNG_CONV' || (gas.o2 && gas.lel));

            // --- VIEWS ---
            if (view === 'WATCHLIST') return (
                <div className="min-h-screen p-6">
                    <header className="glass p-6 rounded-[2rem] border-l-4 border-blue-500 mb-8 flex justify-between items-center">
                        <div>
                            <h1 className="text-sm font-black uppercase text-blue-500">Safety Officer by NT</h1>
                            <p className="text-[7px] opacity-40 uppercase font-black">Autonomous Division V2.5</p>
                        </div>
                        <button onClick={() => setView('ACADEMY')} className={`p-3 rounded-xl text-[8px] font-black uppercase ${academyCleared ? 'bg-emerald-500/20 text-emerald-500' : 'bg-red-500/20 text-red-500'}`}>
                            {academyCleared ? 'Clearance Active' : 'Clearance Required'}
                        </button>
                    </header>

                    <div className="space-y-4">
                        {fleet.map(v => (
                            <div key={v.id} onClick={() => { 
                                if(!academyCleared && v.type === 'LNG_CONV') return alert("COMPLETE ACADEMY FIRST!");
                                setActiveVessel(v); setView('INSPECTION'); 
                            }} className={`glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 ${v.type === 'LNG_CONV' && !academyCleared ? 'opacity-30 border-red-900' : 'border-blue-600'}`}>
                                <div>
                                    <p className="text-xs font-black uppercase italic">{v.name}</p>
                                    <p className="text-[8px] opacity-40 uppercase mt-1">{v.shift} | {v.type}</p>
                                </div>
                                {completed[v.id] ? <i className="fa-solid fa-check-circle text-emerald-500 text-xl"></i> : <i className="fa-solid fa-chevron-right opacity-20"></i>}
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'ACADEMY') return (
                <div className="min-h-screen p-8 space-y-6">
                    <h2 className="text-xl font-black uppercase italic text-blue-500 text-center">Internal Academy</h2>
                    <div className="glass p-6 rounded-3xl space-y-4 text-[10px] leading-relaxed">
                        <p className="text-orange-500 font-black">REQUIRED STUDY: FSRU ALEXANDROUPOLIS</p>
                        <p>1. ISGOTT V6: O2 must be 20.9% and LEL 0% for Hot Works.</p>
                        <p>2. P.D. 70/1990: Fire Watch and Gas-Free Certs are Mandatory.</p>
                        <p>3. SIMOPS: Coordinate all lifting with Crane Operators.</p>
                    </div>
                    <button onClick={() => { setAcademyCleared(true); setView('WATCHLIST'); }} className="fat-finger w-full bg-emerald-600 text-white">Confirm Study & Unlock Shift</button>
                </div>
            );

            return (
                <div className="min-h-screen p-6 pb-64">
                    <div className="glass p-8 rounded-[3rem] text-center mb-8 border-l-4 border-emerald-500">
                        <h2 className="text-2xl font-black uppercase italic">{activeVessel.name}</h2>
                        <p className="text-[8px] text-emerald-500 font-black uppercase mt-1 tracking-widest">In-App Compliance Active</p>
                    </div>

                    <div className="space-y-6">
                        <button onClick={() => setTasks([...tasks, 1])} className="w-full h-14 glass border border-blue-500/30 text-[10px] font-black uppercase italic">Add Compliance Task +</button>
                        
                        {tasks.length > 0 && (
                            <div className="glass p-6 rounded-[2rem] space-y-4 border-l-4 border-orange-500">
                                <label className="flex items-center gap-4"><input type="checkbox" onChange={(e)=>setChecks({...checks, fire: e.target.checked})} className="w-5 h-5 accent-orange-500" /><span className="text-[10px] font-black uppercase">Fire Watch Set</span></label>
                                <label className="flex items-center gap-4"><input type="checkbox" onChange={(e)=>setChecks({...checks, gasFree: e.target.checked})} className="w-5 h-5 accent-orange-500" /><span className="text-[10px] font-black uppercase">Gas-Free Verified</span></label>
                                
                                {activeVessel.type === 'LNG_CONV' && (
                                    <div className="grid grid-cols-2 gap-4 pt-4 border-t border-white/5">
                                        <input type="number" placeholder="O2 %" value={gas.o2} onChange={(e)=>setGas({...gas, o2: e.target.value})} className="bg-black/40 p-4 rounded-xl text-center text-xs outline-none" />
                                        <input type="number" placeholder="LEL %" value={gas.lel} onChange={(e)=>setGas({...gas, lel: e.target.value})} className="bg-black/40 p-4 rounded-xl text-center text-xs outline-none" />
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-6 left-6 right-6 space-y-3 glass p-4 rounded-[2rem]">
                        <button onClick={() => setPhotos([...photos, 1])} className="fat-finger w-full bg-slate-800 text-white">Capture Evidence ({photos.length}/2)</button>
                        <button disabled={!canSign} onClick={() => { setCompleted({...completed, [activeVessel.id]: true}); setView('WATCHLIST'); }} 
                                className={`fat-finger w-full ${canSign ? 'bg-emerald-600 matrix-blink' : 'bg-slate-900 opacity-50'}`}>Sign Daily Log</button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyOfficerV25 />);
    </script>
</body>
</html>
