<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safety Officer by NT | V2.5.2 Forensic</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fat-finger { height: 75px; font-weight: 900; text-transform: uppercase; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .fat-finger:active { transform: scale(0.95); }
        select { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 1rem; color: white; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .matrix-blink { animation: blink 1.5s infinite; border: 2px solid #10b981; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); } 50% { box-shadow: none; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SafetyOfficerV252 = () => {
            const [view, setView] = useState('WATCHLIST');
            const [academyCleared, setAcademyCleared] = useState(false);
            const [completedVessels, setCompletedVessels] = useState({});
            
            // Inspection States
            const [activeVessel, setActiveVessel] = useState(null);
            const [photos, setPhotos] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [selectedArea, setSelectedArea] = useState('Main Deck');
            const [selectedJob, setSelectedJob] = useState('Hot Works');
            
            // Compliance states (P.D. 70/1990)
            const [checks, setChecks] = useState({ fire: false, gasFree: false });
            const [gas, setGas] = useState({ o2: '', lel: '' });

            const fleet = [
                { id: 1, name: 'MT FELIX', type: 'LNG_CONV', shift: '07:00-11:00', imo: '9464182' },
                { id: 2, name: 'BADJI MOKHTAR III', type: 'LNG_CONV', shift: '11:00-13:00', imo: '9827889' },
                { id: 3, name: 'ΑΡΙΑΔΝΗ', type: 'STANDARD', shift: '13:00-15:00', imo: '9135262' },
                { id: 4, name: 'RIGEL III', type: 'STANDARD', shift: '15:00-17:00', imo: '7807744' }
            ];

            const isLNG = activeVessel?.type === 'LNG_CONV';
            const hasHotWorks = tasks.length > 0;
            
            // Evidence Lock Logic [Step 2 & 3 Integration]
            const gasReady = isLNG ? (gas.o2 !== '' && gas.lel !== '') : true;
            const checksReady = hasHotWorks ? (checks.fire && checks.gasFree) : true;
            const canSign = photos.length >= 2 && tasks.length > 0 && checksReady && gasReady;

            const openInspection = (v) => {
                if(!academyCleared && v.type === 'LNG_CONV') return alert("COMPLETE INTERNAL ACADEMY CLEARANCE FIRST!");
                setActiveVessel(v); setView('INSPECTION');
                // Reset state for new inspection
                setPhotos([]); setTasks([]); setChecks({fire:false, gasFree:false}); setGas({o2:'', lel:''});
            };

            // [V2.5.2] BLACK BOX LOGIC
            const handleSignLog = () => {
                if (!canSign) return;

                const logEntry = {
                    timestamp: new Date().toLocaleString('el-GR'),
                    vessel: activeVessel.name,
                    imo: activeVessel.imo,
                    shift: activeVessel.shift,
                    tasks_performed: tasks.map(t => ({ area: t.area, job: t.job })),
                    compliance: checks,
                    gas_forensics: isLNG ? gas : "N/A",
                    evidence_count: photos.length,
                    status: "FORENSIC_LOCKED"
                };

                // Store to Local Storage (The Black Box)
                const currentLogs = JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]');
                currentLogs.push(logEntry);
                localStorage.setItem('ntg_M2_logs', JSON.stringify(currentLogs));

                alert(`Forensic Log Secured for ${activeVessel.name}! Checkmark Active.`);
                setCompletedVessels({...completedVessels, [activeVessel.id]: true});
                setView('WATCHLIST');
            };

            if (view === 'WATCHLIST') return (
                <div className="min-h-screen p-6">
                    <header className="glass p-6 rounded-[2rem] border-l-4 border-blue-500 mb-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-sm font-black uppercase text-blue-500 tracking-tighter">Safety Officer by NT</h1>
                            <p className="text-[7px] opacity-40 uppercase font-black tracking-widest">Autonomous Division v2.5.2</p>
                        </div>
                        <button onClick={() => setView('ACADEMY')} className={`px-4 py-2 rounded-xl text-[8px] font-black uppercase tracking-widest ${academyCleared ? 'bg-emerald-500/20 text-emerald-500 border border-emerald-500/30' : 'bg-red-500/20 text-red-500 border border-red-500/30 animate-pulse'}`}>
                            {academyCleared ? 'Clearance Active' : 'Clearance Required'}
                        </button>
                    </header>

                    <div className="space-y-4">
                        <p className="text-[9px] uppercase font-black opacity-30 ml-2 tracking-widest">Active Operations (SEPE Schedule)</p>
                        {fleet.map(v => (
                            <div key={v.id} onClick={() => openInspection(v)} className={`glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 transition-all active:scale-95 cursor-pointer ${v.type === 'LNG_CONV' && !academyCleared ? 'opacity-30 border-red-900 grayscale' : 'border-blue-600'}`}>
                                <div>
                                    <p className="text-xs font-black uppercase italic tracking-tight">{v.name}</p>
                                    <p className="text-[8px] opacity-40 uppercase font-black tracking-widest mt-1">IMO: {v.imo} | {v.shift}</p>
                                </div>
                                {completedVessels[v.id] ? <i className="fa-solid fa-check-circle text-emerald-500 text-xl animate-bounce"></i> : <i className="fa-solid fa-chevron-right opacity-20"></i>}
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'ACADEMY') return (
                <div className="min-h-screen p-8 flex flex-col justify-center">
                    <div className="glass p-8 rounded-[3rem] space-y-6 border-l-4 border-blue-500">
                        <h2 className="text-xl font-black uppercase italic text-blue-500">Internal Academy</h2>
                        <div className="space-y-4 text-[10px] leading-relaxed opacity-80 uppercase font-black">
                            <p className="text-orange-500">Required Reading: FSRU Alexandroupolis</p>
                            <div className="bg-black/20 p-5 rounded-2xl space-y-2 border border-white/5">
                                <p>1. ISGOTT V6: O2 @ 20.9% / LEL @ 0% (Strict)</p>
                                <p>2. Π.Δ. 70/1990: Fire Watch & Gas-Free Certificate</p>
                                <p>3. EVIDENCE: Min 2 Photos per Shift required.</p>
                            </div>
                        </div>
                        <button onClick={() => { setAcademyCleared(true); setView('WATCHLIST'); }} className="fat-finger w-full bg-blue-600 text-white shadow-lg">Confirm Study & Unlock Shift</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-6 pb-64">
                    <button onClick={() => setView('WATCHLIST')} className="text-[9px] underline text-blue-500 mb-6 uppercase font-black italic tracking-widest">← Return to Radar</button>
                    
                    <div className="glass p-8 rounded-[3rem] text-center mb-8 border-l-4 border-emerald-500">
                        <h2 className="text-2xl font-black uppercase italic tracking-tighter">{activeVessel.name}</h2>
                        <p className="text-[8px] text-emerald-500 font-black uppercase tracking-widest italic mt-1">Operational Mode: Forensic Active</p>
                    </div>

                    <div className="space-y-6">
                        {/* Dynamic Joblist Builder */}
                        <div className="glass p-6 rounded-[2rem] space-y-4">
                            <h4 className="text-[10px] font-black uppercase text-blue-400 italic">Joblist Builder</h4>
                            <div className="grid grid-cols-2 gap-3">
                                <select onChange={(e) => setSelectedArea(e.target.value)}><option>Main Deck</option><option>Engine Room</option><option>Pump Room</option></select>
                                <select onChange={(e) => setSelectedJob(e.target.value)}><option>Hot Works</option><option>Confined Space</option><option>Lifting Ops</option></select>
                            </div>
                            <button onClick={() => setTasks([...tasks, {id:Date.now(), area:selectedArea, job:selectedJob}])} className="w-full bg-blue-600/20 border border-blue-600/50 text-blue-400 h-12 rounded-xl font-black uppercase text-[10px] italic">Add Task to Shift +</button>
                            
                            {tasks.length > 0 && (
                                <div className="space-y-2 mt-4 pt-4 border-t border-white/10">
                                    {tasks.map(t => (
                                        <div key={t.id} className="bg-slate-900/50 p-4 rounded-xl text-[9px] font-black uppercase flex justify-between border-l-2 border-emerald-500">
                                            <span className="opacity-50">{t.area}</span><span>{t.job}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* P.D. 70/1990 Injection */}
                        {tasks.length > 0 && (
                            <div className="glass p-6 rounded-[2.5rem] space-y-5 border-l-4 border-orange-500">
                                <h4 className="text-[10px] font-black uppercase text-orange-500 italic">Compliance Check (Π.Δ. 70/1990)</h4>
                                <label className="flex items-center gap-4 cursor-pointer"><input type="checkbox" checked={checks.fire} onChange={(e)=>setChecks({...checks, fire: e.target.checked})} className="w-6 h-6 accent-orange-500" /><span className="text-[10px] font-black uppercase">Fire Watch Set</span></label>
                                <label className="flex items-center gap-4 cursor-pointer"><input type="checkbox" checked={checks.gasFree} onChange={(e)=>setChecks({...checks, gasFree: e.target.checked})} className="w-6 h-6 accent-orange-500" /><span className="text-[10px] font-black uppercase">Gas-Free Verified</span></label>
                                
                                {isLNG && (
                                    <div className="pt-4 border-t border-white/5 space-y-3">
                                        <p className="text-[9px] font-black uppercase text-red-500 italic">LNG Monitoring (ISGOTT V6)</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="number" placeholder="O2 % (20.9)" value={gas.o2} onChange={(e)=>setGas({...gas, o2: e.target.value})} className="bg-black/40 p-4 rounded-xl text-center text-xs outline-none border border-white/5 text-white" />
                                            <input type="number" placeholder="LEL % (0)" value={gas.lel} onChange={(e)=>setGas({...gas, lel: e.target.value})} className="bg-black/40 p-4 rounded-xl text-center text-xs outline-none border border-white/5 text-white" />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Evidence Bar & Forensic Sign Button */}
                    <div className="fixed bottom-6 left-6 right-6 space-y-3 glass p-4 rounded-[2.5rem] border-t border-white/10 z-50">
                        <button onClick={() => setPhotos([...photos, Date.now()])} className="fat-finger w-full bg-slate-800 text-white border border-slate-700 shadow-xl">
                            <i className="fa-solid fa-camera"></i> Evidence ({photos.length}/2)
                        </button>
                        <button disabled={!canSign} onClick={handleSignLog} 
                                className={`fat-finger w-full ${canSign ? 'bg-emerald-600 text-white matrix-blink' : 'bg-slate-900 text-slate-600 opacity-50 border border-white/5'}`}>
                            <i className="fa-solid fa-file-signature text-xl"></i> {canSign ? "Sign Daily Log" : "Evidence Missing"}
                        </button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyOfficerV252 />);
    </script>
</body>
</html>
