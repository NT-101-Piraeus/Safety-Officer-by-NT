<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safety Officer by NT | Secure Gate</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fat-finger { height: 75px; font-weight: 900; text-transform: uppercase; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .matrix-blink { animation: blink 1.5s infinite; border: 2px solid #10b981; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); } 50% { box-shadow: none; } }
        input[type="password"] { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 1rem; color: white; text-align: center; font-size: 24px; letter-spacing: 0.5em; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- MASTER CONFIG ---
        const MASTER_PASSCODE = "2026"; // <--- ΑΛΛΑΞΕ ΤΟΝ ΚΩΔΙΚΟ ΕΔΩ
        const SEPE_SCHEDULE = [
            { id: 'ALX01', name: 'MT FELIX', type: 'LNG_CONV', shift: '07:00-11:00', imo: '9464182' },
            { id: 'ALX02', name: 'BADJI MOKHTAR III', type: 'LNG_CONV', shift: '11:00-13:00', imo: '9827889' },
            { id: 'ALX03', name: 'ΑΡΙΑΔΝΗ', type: 'STANDARD', shift: '13:00-15:00', imo: '9135262' },
            { id: 'ALX04', name: 'RIGEL III', type: 'STANDARD', shift: '15:00-17:00', imo: '7807744' }
        ];

        const SafetyOfficerV255 = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passInput, setPassInput] = useState("");
            const [view, setView] = useState('WATCHLIST');
            const [academyCleared, setAcademyCleared] = useState(() => localStorage.getItem('ntg_academy_ok') === 'true');
            const [completedVessels, setCompletedVessels] = useState(() => JSON.parse(localStorage.getItem('ntg_completed_today') || '{}'));
            
            const [activeVessel, setActiveVessel] = useState(null);
            const [photos, setPhotos] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [checks, setChecks] = useState({ fire: false, gasFree: false });
            const [gas, setGas] = useState({ o2: '', lel: '' });

            useEffect(() => { localStorage.setItem('ntg_academy_ok', academyCleared); }, [academyCleared]);
            useEffect(() => { localStorage.setItem('ntg_completed_today', JSON.stringify(completedVessels)); }, [completedVessels]);

            const handleLogin = (e) => {
                if (passInput === MASTER_PASSCODE) {
                    setIsAuthenticated(true);
                } else if (passInput.length >= 4) {
                    alert("WRONG PASSCODE - ACCESS DENIED");
                    setPassInput("");
                }
            };

            const generatePDF = () => {
                const logs = JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]');
                if (logs.length === 0) return alert("NO LOGS FOUND");
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("NAUTICAL TECHNOLOGY - SAFETY REPORT", 10, 20);
                let y = 40;
                logs.forEach(log => {
                    doc.text(`${log.vessel} | ${log.ts}`, 10, y);
                    y += 15;
                });
                doc.save(`NT_Report.pdf`);
            };

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm text-center border-t-4 border-blue-500">
                        <i className="fa-solid fa-shield-halved text-5xl text-blue-500 mb-6"></i>
                        <h2 className="text-xl font-black uppercase mb-8 italic">Secure Access</h2>
                        <input type="password" value={passInput} onChange={(e) => setPassInput(e.target.value)} placeholder="****" maxLength="4" />
                        <button onClick={handleLogin} className="fat-finger w-full bg-blue-600 text-white mt-6">Unlock App</button>
                        <p className="text-[8px] opacity-30 mt-8 font-black uppercase tracking-widest">Nautical Technology Security Protocol</p>
                    </div>
                </div>
            );

            // --- MAIN APP VIEWS ---
            if (view === 'WATCHLIST') return (
                <div className="min-h-screen p-6">
                    <header className="glass p-6 rounded-[2rem] border-l-4 border-blue-500 mb-10">
                        <div className="flex justify-between items-center">
                            <div><h1 className="text-sm font-black uppercase text-blue-500">Safety Officer</h1><p className="text-[7px] opacity-40 uppercase font-black">by NT | V2.5.5 SECURE</p></div>
                            <button onClick={() => setView('ACADEMY')} className={`px-4 py-2 rounded-xl text-[8px] font-black uppercase ${academyCleared ? 'text-emerald-500' : 'text-red-500 animate-pulse'}`}>{academyCleared ? 'Clearance OK' : 'Academy Lock'}</button>
                        </div>
                        <button onClick={generatePDF} className="w-full mt-4 bg-blue-600/20 border border-blue-500/50 text-blue-400 h-10 rounded-xl text-[8px] font-black uppercase italic tracking-widest"><i className="fa-solid fa-file-pdf mr-2"></i>Generate Booklet</button>
                    </header>
                    <div className="space-y-4">
                        {SEPE_SCHEDULE.map(v => (
                            <div key={v.id} onClick={() => { if(!academyCleared && v.type === 'LNG_CONV') return; setActiveVessel(v); setView('INSPECTION'); setPhotos([]); setTasks([]); setChecks({fire:false, gasFree:false}); setGas({o2:'', lel:''}); }} className={`glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 transition-all ${v.type === 'LNG_CONV' && !academyCleared ? 'opacity-30 border-red-900' : 'border-blue-600 active:scale-95 cursor-pointer'}`}>
                                <div><p className="text-xs font-black uppercase italic">{v.name}</p><p className="text-[8px] opacity-40 uppercase font-black mt-1">{v.shift}</p></div>
                                {completedVessels[v.id] ? <i className="fa-solid fa-check-circle text-emerald-500 text-xl"></i> : <i className="fa-solid fa-chevron-right opacity-20"></i>}
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'ACADEMY') return (
                <div className="min-h-screen p-8 flex flex-col justify-center space-y-6 text-[10px] uppercase font-black tracking-widest">
                    <div className="glass p-8 rounded-[3rem] space-y-6 border-l-4 border-blue-500">
                        <h2 className="text-xl italic text-blue-500">Internal Academy</h2>
                        <div className="bg-black/20 p-4 rounded-2xl space-y-2 opacity-70"><p>1. ISGOTT: O2 20.9% / LEL 0%</p><p>2. P.D. 70/90: Mandatory Watch</p><p>3. EVIDENCE: Min 2 Photos</p></div>
                        <button onClick={() => {setAcademyCleared(true); setView('WATCHLIST');}} className="fat-finger w-full bg-blue-600 text-white">Unlock Ops</button>
                    </div>
                </div>
            );

            const isLNG = activeVessel?.type === 'LNG_CONV';
            const canSign = photos.length >= 2 && tasks.length > 0 && checks.fire && checks.gasFree && (!isLNG || (gas.o2 && gas.lel));

            return (
                <div className="min-h-screen p-6 pb-64">
                    <button onClick={() => setView('WATCHLIST')} className="text-[9px] underline text-blue-500 mb-6 uppercase font-black italic tracking-widest">← Return to Radar</button>
                    <div className="glass p-8 rounded-[3rem] text-center mb-8 border-l-4 border-emerald-500">
                        <h2 className="text-2xl font-black uppercase italic tracking-tighter">{activeVessel.name}</h2>
                        <p className="text-[8px] text-emerald-500 font-black uppercase mt-1 tracking-widest italic tracking-widest">Compliance Mode Active</p>
                    </div>
                    <div className="space-y-6">
                        <div className="glass p-6 rounded-[2rem] space-y-4 text-center">
                            <button onClick={() => setTasks([...tasks, {id:Date.now(), job:'Hot Works'}])} className="w-full bg-blue-600/20 border border-blue-600/50 text-blue-400 h-12 rounded-xl font-black uppercase text-[10px] italic">Add Compliance Task +</button>
                            {tasks.map(t => <div key={t.id} className="bg-slate-900/50 p-4 rounded-xl text-[9px] font-black uppercase flex justify-between border-l-2 border-emerald-500"><span>Main Deck</span><span className="text-emerald-500">{t.job}</span></div>)}
                        </div>
                        {tasks.length > 0 && (
                            <div className="glass p-6 rounded-[2.5rem] space-y-5 border-l-4 border-orange-500">
                                <label className="flex items-center gap-4"><input type="checkbox" onChange={(e)=>setChecks({...checks, fire: e.target.checked})} className="w-6 h-6 accent-orange-500" /><span className="text-[10px] font-black uppercase tracking-widest">Fire Watch</span></label>
                                <label className="flex items-center gap-4"><input type="checkbox" onChange={(e)=>setChecks({...checks, gasFree: e.target.checked})} className="w-6 h-6 accent-orange-500" /><span className="text-[10px] font-black uppercase tracking-widest">Gas-Free Verified</span></label>
                                {isLNG && <div className="grid grid-cols-2 gap-3 pt-4 border-t border-white/5"><input type="number" placeholder="O2 %" value={gas.o2} onChange={(e)=>setGas({...gas, o2: e.target.value})} className="bg-black/40 p-4 rounded-xl text-center text-xs outline-none text-white font-bold" /><input type="number" placeholder="LEL %" value={gas.lel} onChange={(e)=>setGas({...gas, lel: e.target.value})} className="bg-black/40 p-4 rounded-xl text-center text-xs outline-none text-white font-bold" /></div>}
                            </div>
                        )}
                    </div>
                    <div className="fixed bottom-6 left-6 right-6 space-y-3 glass p-4 rounded-[2.5rem] border-t border-white/10">
                        <button onClick={() => setPhotos([...photos, Date.now()])} className="fat-finger w-full bg-slate-800 text-white border border-slate-700 shadow-xl">Capture Evidence ({photos.length}/2)</button>
                        <button disabled={!canSign} onClick={() => { setCompletedVessels({...completedVessels, [activeVessel.id]: true}); setView('WATCHLIST'); }} className={`fat-finger w-full ${canSign ? 'bg-emerald-600 text-white matrix-blink' : 'bg-slate-900 text-slate-600 opacity-50'}`}>Sign Daily Log</button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyOfficerV255 />);
    </script></body></html>
